services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: csit-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./profile:/var/www/html/profile
      - ./resumes:/var/www/html/resumes
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: csit-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ip
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: csit-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
